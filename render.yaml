services:
  - type: web
    name: backend-eleuterio
    runtime: java
    plan: free
    region: oregon
    buildCommand: cd backend && chmod +x mvnw && ./mvnw clean package -DskipTests
    startCommand: cd backend && java -jar target/abarrotes-api-1.0.0.jar
    envVars:
      - key: SUPABASE_DB_HOST
        value: aws-1-us-east-2.pooler.supabase.com
      - key: SUPABASE_DB_PORT
        value: 6543
      - key: SUPABASE_DB_NAME
        value: postgres
      - key: SUPABASE_DB_USER
        value: postgres.pmzrcydmtkfbfkoicwnh
      - key: SUPABASE_DB_PASSWORD
        value: xOmsFiervvVbNJmq
      - key: SUPABASE_DB_SSLMODE
        value: require
      - key: JWT_SECRET
        value: bWcfYJ6hMClImzs9HgU7xPyre4ZaBSDA
      - key: CORS_ORIGINS
        value: https://frontend-eleuterio.onrender.com,http://localhost:4200

  - type: static
    name: frontend-eleuterio
    plan: free
    region: oregon
    buildCommand: cd frontend && npm install && npm run build -- --prod
    publishPath: frontend/dist/frontend